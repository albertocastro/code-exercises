name: Deploy code-exercises

# Separate, self-contained workflow. It only ever touches code-exercises on
# the box (the ~/code-exercises checkout + the code-exercises.service unit).
# It never restarts, rebuilds, or reads any next-role-* or learnos service —
# those have their own workflows.
#
# Build model: OFF-BOX build shipped via `docker save`/`docker load` (no
# registry, no GHCR, no credentials on the box). CI builds the image, streams
# it to the box as a gzipped tarball over the existing tailnet SSH, and the box
# only `docker load`s + tags + restarts. The box NEVER builds — the shared
# 3.8 GiB box can't spare the RAM/CPU for an image build without risking the
# co-located next-role-2 and LearnOS. This mirrors the save/load pattern
# already running in production for those two services.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Namespaced so it can't serialize against next-role's or learnos's deploy
  # concurrency.
  group: deploy-code-exercises-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts: the repo's `postinstall` (scripts/runtime.mjs install
      # all) only verifies a JDK is present for the in-process Java runner. The
      # CI runner has no JDK and doesn't run Java exercises, so skip it — the JDK
      # is baked into the app image and checked at container startup instead.
      - run: npm ci --ignore-scripts

      # CI gate: validate the app compiles. This is the ONLY gate.
      #
      # NOTE: there is deliberately NO jest/vitest gate. The exercises repo ships
      # UNIMPLEMENTED learner starter stubs (e.g. `export class EventBus {}`), so
      # `npm test` / `npm run test:react` fail BY DESIGN (~325/502 red) and can
      # never gate a deploy on this repo. The Build step below is the pre-deploy
      # compile gate; runtime correctness (HTTP 200, in-process Java, non-root,
      # no docker.sock) is proven on-box by the health check after the image is
      # loaded and the service restarts.
      - name: Build (static web IDE bundle)
        run: npm run web:build

      # Off-box image build. GitHub's ubuntu-latest runners are linux/amd64;
      # the shared box is amd64 too (same box that already runs the amd64
      # next-role-2 and learnos images built this same way), so the loaded image
      # is arch-correct. The Dockerfile runs its own `npm run web:build` in a
      # builder stage, so the gate above is a fast fail-fast check, not the
      # source of the shipped bundle.
      - name: Build and save the image
        run: |
          docker build -t code-exercises:${GITHUB_SHA} .
          docker save code-exercises:${GITHUB_SHA} | gzip > ce-image.tar.gz
          ls -lh ce-image.tar.gz

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Tailnet DNS can take a few seconds to propagate after joining; an
          # immediate keyscan returns nothing and later ssh dies with "Host key
          # verification failed". Retry; accept-new on the ssh call is the real
          # safety net.
          for i in 1 2 3 4 5; do
            ssh-keyscan -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed; retrying in 3s"
            sleep 3
          done

      # Ship the compose/deploy manifests to the box with rsync (mirrors
      # next-role-2 and learnos). The box therefore needs NO GitHub credentials
      # for this private repo — the runner is already authed and holds the
      # source. --delete keeps ~/code-exercises a faithful mirror of main; the
      # excludes never ship or wipe build junk, and /var/lib/code-exercises
      # (runtime state) lives outside ~/code-exercises so it's never touched.
      # The box does NOT build from this source — the image arrives pre-built in
      # the tarball below; this rsync just keeps docker-compose.yml,
      # deploy/docker-compose.prod.yml, the systemd unit, and docs in sync.
      - name: Sync manifests to the box
        run: |
          rsync -az --delete --info=stats1 \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'dist-web/' \
            --exclude 'ce-image.tar.gz' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            ./ deploy@${{ vars.DEPLOY_HOST }}:~/code-exercises/

      # Stream the gzipped image tarball to the box.
      - name: Ship the image tarball
        run: |
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            ce-image.tar.gz deploy@${{ vars.DEPLOY_HOST }}:~/ce-image.tar.gz

      - name: Load image and restart on the box
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            deploy@${{ vars.DEPLOY_HOST }} "IMAGE_SHA='${GITHUB_SHA}' bash -s" <<'EOF'
          set -euo pipefail
          TARBALL="$HOME/ce-image.tar.gz"
          # Always remove the tarball from the box, success or fail.
          trap 'rm -f "$TARBALL"' EXIT

          cd ~/code-exercises

          # Load the pre-built image (arch-correct amd64 from CI). This does NOT
          # build anything on the box.
          gunzip -c "$TARBALL" | docker load

          # Keep the currently-live image as :previous for a fast rollback if the
          # new one boots broken.
          if docker image inspect code-exercises:local >/dev/null 2>&1; then
            docker tag code-exercises:local code-exercises:previous
          fi

          # Promote the freshly-loaded image to the tag compose actually runs
          # (docker-compose.yml pins image: code-exercises:local).
          docker tag "code-exercises:${IMAGE_SHA}" code-exercises:local

          # ExecStart is `docker compose up`: because code-exercises:local now
          # exists locally, compose USES it and never builds. Persistent state
          # under /var/lib/code-exercises is bind-mounted, so it survives the
          # recreate untouched.
          sudo systemctl restart code-exercises
          sudo systemctl --no-pager --lines=0 status code-exercises

          # Health gate: prove the app actually serves on :3200 after the
          # restart (the container takes a couple seconds to recreate + boot
          # Node). ~60s budget: 30 attempts x 2s.
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 http://127.0.0.1:3200/ >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "$ok" = "1" ]; then
            echo "Health check OK: app serving on 127.0.0.1:3200"
          else
            echo "Health check FAILED: app not serving on :3200 after restart"
            # journalctl for this unit is world-readable to the deploy user
            # without sudo (default journald ACLs); avoid sudo here so a missing
            # NOPASSWD rule can't mask the real failure with a tty prompt.
            journalctl -u code-exercises --no-pager -n 80 2>/dev/null || true
            # Roll back to the last-good image if we have one, then fail the run.
            if docker image inspect code-exercises:previous >/dev/null 2>&1; then
              echo "Rolling back: retagging code-exercises:previous -> code-exercises:local"
              docker tag code-exercises:previous code-exercises:local
              sudo systemctl restart code-exercises
            fi
            exit 1
          fi
          EOF

      # Clean up the tarball on the runner regardless of outcome (the box side
      # cleans itself via the trap above).
      - name: Clean up runner tarball
        if: always()
        run: rm -f ce-image.tar.gz
